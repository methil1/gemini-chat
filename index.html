<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>対話</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="app">
    <div class="system-main-frame">
      <header class="system-header">
        <div class="logo-group">
          <svg class="logo-icon" viewBox="0 0 100 100" width="30" height="30">
            <rect width="100" height="100" rx="20" fill="currentColor"/>
          </svg>
          <h1 class="brand-text">対話</h1>
        </div>
        <div class="system-info">
          <button id="clear-btn" class="clear-button" title="会話をリセット">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
            </svg>
            <span>リセット</span>
          </button>
        </div>
      </header>

      <div class="viewport-frame">
        <main class="chat-container">
          <div id="chat-history" class="chat-history">
            <!-- メッセージはここに動的に挿入されます -->
            <div class="message system-intro">
              <div class="msg-content">
                <p>ようこそ。メッセージをどうぞ。</p>
              </div>
            </div>
          </div>

          <div class="typing-indicator hidden" id="loading-indicator">
            <span class="typing-text">応答を生成中...</span>
            <div class="progress-bar">
              <div class="bar-fill"></div>
            </div>
          </div>
        </main>
      </div>

      <footer class="input-control-panel">
        <div class="input-wrapper">
          <textarea id="chat-input" placeholder="メッセージを入力..." rows="1"></textarea>
          <div class="input-focus-border"></div>
        </div>
        <button id="send-btn" class="send-button" type="button">
          <span class="btn-text">送信</span>
          <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </footer>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
